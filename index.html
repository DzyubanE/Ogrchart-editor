<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OrgChart Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0efeb;
  --surface: #ffffff;
  --surface2: #f5f4f1;
  --b1: rgba(0,0,0,.07);
  --b2: rgba(0,0,0,.13);
  --t1: #111;
  --t2: #555;
  --t3: #999;
  --accent: #3b82f6;
  --sh: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.08);
  --sh2: 0 2px 8px rgba(0,0,0,.08), 0 12px 32px rgba(0,0,0,.12);
}

html, body { height: 100%; font-family: 'Geist', system-ui, sans-serif; background: var(--bg); color: var(--t1); overflow: hidden; font-size: 13px; }
.app { display: flex; flex-direction: column; height: 100vh; }

/* HEADER */
.hdr {
  height: 50px; display: flex; align-items: center; padding: 0 14px; gap: 6px;
  background: var(--surface); border-bottom: 1px solid var(--b1); z-index: 100; flex-shrink: 0;
}
.logo { font-size: 13.5px; font-weight: 700; letter-spacing: -.03em; color: var(--t1); padding-right: 6px; }
.logo span { color: var(--accent); }
.sep { width: 1px; height: 18px; background: var(--b2); margin: 0 2px; }

/* editable title */
.chart-title-wrap { display: flex; align-items: center; gap: 5px; }
#chart-title {
  font-size: 12.5px; font-weight: 600; color: var(--t1);
  background: transparent; border: 1px solid transparent; border-radius: 6px;
  padding: 3px 7px; font-family: 'Geist', sans-serif; outline: none;
  transition: border-color .15s, background .15s; min-width: 120px;
}
#chart-title:hover { border-color: var(--b2); background: var(--surface2); }
#chart-title:focus { border-color: var(--accent); background: var(--surface); }

.btn {
  display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px;
  border-radius: 8px; font-size: 12px; font-weight: 600; border: 1px solid var(--b2);
  background: var(--surface); color: var(--t1); cursor: pointer;
  transition: background .12s, border-color .12s; font-family: 'Geist', sans-serif;
  white-space: nowrap; line-height: 1;
}
.btn:hover { background: var(--surface2); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { background: #2563eb; }
.btn.danger { color: #dc2626; border-color: rgba(220,38,38,.2); }
.btn.danger:hover { background: rgba(220,38,38,.08); }
.btn.conn-active { background: #fef3c7; border-color: #f59e0b; color: #92400e; }
.btn svg { width: 13px; height: 13px; flex-shrink: 0; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.hdr-right { margin-left: auto; display: flex; align-items: center; gap: 5px; }

/* BODY */
.body { flex: 1; display: flex; overflow: hidden; position: relative; }

/* SIDEBAR */
.sb {
  width: 258px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--b1);
  display: flex; flex-direction: column; z-index: 50; overflow: hidden;
}
.sb-head { padding: 12px 14px 8px; font-size: 10.5px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--t3); border-bottom: 1px solid var(--b1); flex-shrink: 0; }
.sb-scroll { flex: 1; overflow-y: auto; padding: 12px 14px; scrollbar-width: thin; scrollbar-color: var(--b2) transparent; }
.sb-empty { font-size: 12px; color: var(--t3); line-height: 1.65; }

.fl { font-size: 10.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--t3); margin: 13px 0 5px; }
.fl:first-child { margin-top: 0; }
input[type=text], select, textarea {
  width: 100%; padding: 7px 9px; background: var(--surface2); border: 1px solid var(--b1);
  border-radius: 8px; color: var(--t1); font-family: 'Geist', sans-serif; font-size: 12.5px;
  outline: none; transition: border-color .15s, box-shadow .15s;
}
input[type=text]:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.1); }

.color-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
.cp { width: 22px; height: 22px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: transform .1s; flex-shrink: 0; }
.cp:hover { transform: scale(1.15); }
.cp.sel { border-color: var(--t1) !important; }
.custom-c { display: flex; gap: 5px; align-items: center; margin-top: 6px; }
.custom-c input[type=color] { width: 34px; height: 30px; padding: 2px; border-radius: 6px; cursor: pointer; border: 1px solid var(--b2); flex-shrink: 0; }

.emp-item { display: flex; gap: 4px; align-items: center; margin-bottom: 5px; }
.emp-item input { flex: 1; min-width: 0; }
.av-btn {
  width: 28px; height: 28px; border-radius: 50%; border: 1.5px dashed var(--b2);
  background: var(--surface2); cursor: pointer; flex-shrink: 0; overflow: hidden;
  display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--t3);
  transition: border-color .15s;
}
.av-btn:hover { border-color: var(--accent); }
.av-btn img { width: 100%; height: 100%; object-fit: cover; }
.x-btn {
  width: 24px; height: 24px; border-radius: 6px; border: 1px solid rgba(220,38,38,.2);
  background: rgba(220,38,38,.05); color: #dc2626; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  transition: background .12s;
}
.x-btn:hover { background: rgba(220,38,38,.12); }

.conn-chip {
  display: flex; align-items: center; gap: 6px; padding: 5px 8px;
  background: var(--surface2); border: 1px solid var(--b1); border-radius: 8px;
  font-size: 11.5px; color: var(--t2); margin-bottom: 4px;
}
.conn-chip .lbl { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.conn-chip strong { color: var(--t1); }

/* INFINITE CANVAS */
.cv-wrap {
  flex: 1; overflow: hidden; position: relative; cursor: default;
  background: var(--bg);
  background-image: radial-gradient(circle, rgba(0,0,0,.13) 1px, transparent 1px);
  background-size: 24px 24px;
}
/* The transform target */
#world { position: absolute; top: 0; left: 0; will-change: transform; }
#svg-lines { position: absolute; top: 0; left: 0; overflow: visible; pointer-events: none; }

/* NODE */
.onode {
  position: absolute; width: 196px; border-radius: 14px; overflow: hidden;
  background: var(--surface); border: 1.5px solid var(--b1); box-shadow: var(--sh);
  cursor: grab; user-select: none;
  transition: box-shadow .15s, border-color .15s;
}
.onode:hover { box-shadow: var(--sh2); }
.onode.sel { border-color: var(--accent) !important; box-shadow: var(--sh2), 0 0 0 3px rgba(59,130,246,.2) !important; }
.onode.conn-src { border-color: #f59e0b !important; box-shadow: 0 0 0 3px rgba(245,158,11,.2) !important; }
.onode.conn-tgt { border-color: #22c55e !important; box-shadow: 0 0 0 3px rgba(34,197,94,.2) !important; cursor: crosshair !important; }
.onode.multi { border-color: #f59e0b !important; box-shadow: 0 0 0 3px rgba(245,158,11,.18) !important; }
.on-head { padding: 11px 12px 10px; display: flex; align-items: center; gap: 8px; }
.on-texts { flex: 1; min-width: 0; }
.on-role { font-size: 12.5px; font-weight: 700; color: #fff; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.on-dept { font-size: 10.5px; color: rgba(255,255,255,.7); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.on-arr { width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform .25s, background .15s; }
.on-arr svg { width: 8px; height: 8px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
.onode.sel .on-arr { transform: rotate(90deg); background: rgba(255,255,255,.35); }

/* connect mode overlay */
.conn-banner {
  position: fixed; top: 58px; left: 50%; transform: translateX(-50%);
  background: #fffbeb; border: 1px solid #f59e0b; border-radius: 20px;
  padding: 7px 18px; font-size: 12.5px; font-weight: 600; color: #92400e;
  z-index: 200; display: none; gap: 10px; align-items: center;
  box-shadow: 0 4px 20px rgba(0,0,0,.1);
}
.conn-banner.show { display: flex; }

/* zoom controls */
.zoom-ctrl {
  position: fixed; bottom: 20px; right: 20px; z-index: 100;
  display: flex; flex-direction: column; gap: 4px;
}
.zoom-ctrl button {
  width: 32px; height: 32px; border-radius: 8px; font-size: 16px; font-weight: 600;
  background: var(--surface); border: 1px solid var(--b2); color: var(--t1); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--sh); transition: background .12s;
}
.zoom-ctrl button:hover { background: var(--surface2); }
.zoom-label { font-size: 10px; font-weight: 600; color: var(--t3); text-align: center; }

/* EXPORT MODAL */
.modal-ov { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 500; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-ov.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--b2); border-radius: 16px; width: 100%; max-width: 700px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 16px 60px rgba(0,0,0,.18); }
.modal-head { padding: 16px 20px; border-bottom: 1px solid var(--b1); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.modal-title { font-size: 14px; font-weight: 700; }
.modal-body { flex: 1; overflow: auto; padding: 16px 20px; }
.code-out { background: #0f1117; border-radius: 10px; padding: 14px; font-family: 'Geist Mono', monospace; font-size: 11px; color: #a5d6ff; line-height: 1.65; white-space: pre; overflow: auto; max-height: 360px; }
.modal-foot { padding: 12px 20px; border-top: 1px solid var(--b1); display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }

/* TOAST */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111; border-radius: 10px; padding: 8px 16px; font-size: 12px; color: #fff; z-index: 999; opacity: 0; transition: opacity .2s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="hdr">
  <div class="logo">Org<span>Chart</span></div>
  <div class="sep"></div>
  <div class="chart-title-wrap">
    <input type="text" id="chart-title" value="Team B · Org Chart" maxlength="60">
  </div>
  <div class="sep"></div>
  <button class="btn primary" onclick="addNode()">
    <svg viewBox="0 0 13 13"><path d="M6.5 1v11M1 6.5h11"/></svg>Блок
  </button>
  <button class="btn" id="btn-conn" onclick="toggleConn()">
    <svg viewBox="0 0 13 13"><circle cx="2.5" cy="2.5" r="1.8"/><circle cx="10.5" cy="10.5" r="1.8"/><path d="M4 4l5.5 5.5"/></svg>Связать
  </button>
  <button class="btn danger" id="btn-del" onclick="deleteSelected()" style="display:none">
    <svg viewBox="0 0 13 13"><path d="M2 3.5h9M5 3.5V2h3v1.5M4 3.5l.6 7.5h3.8l.6-7.5"/></svg>Удалить
  </button>
  <div class="hdr-right">
    <button class="btn" onclick="fitView()">
      <svg viewBox="0 0 13 13"><rect x="1" y="1" width="4" height="4" rx=".8"/><rect x="8" y="1" width="4" height="4" rx=".8"/><rect x="1" y="8" width="4" height="4" rx=".8"/><rect x="8" y="8" width="4" height="4" rx=".8"/></svg>Вписать
    </button>
    <button class="btn" onclick="loadExample()">Пример</button>
    <button class="btn" onclick="clearAll()">Очистить</button>
    <button class="btn primary" onclick="openExport()">
      <svg viewBox="0 0 13 13"><path d="M2 9.5v2h9v-2M6.5 1v7.5M4 6l2.5 3L9 6"/></svg>Экспорт
    </button>
  </div>
</div>

<div class="body">
<!-- SIDEBAR -->
<div class="sb">
  <div class="sb-head" id="sb-head">Свойства</div>
  <div class="sb-scroll" id="sb-body">
    <div class="sb-empty">Нажмите <b>+ Блок</b> чтобы добавить карточку, затем кликните на неё для редактирования</div>
  </div>
</div>

<!-- INFINITE CANVAS -->
<div class="cv-wrap" id="cv-wrap">
  <div id="world">
    <svg id="svg-lines" width="1" height="1"></svg>
  </div>
</div>
</div>

<!-- connect banner -->
<div class="conn-banner" id="conn-banner">
  <span id="conn-text">Кликните на источник</span>
  <button class="btn" onclick="toggleConn()">Отмена</button>
</div>

<!-- zoom -->
<div class="zoom-ctrl">
  <button onclick="changeZoom(0.1)">+</button>
  <div class="zoom-label" id="zoom-lbl">100%</div>
  <button onclick="changeZoom(-0.1)">−</button>
</div>

<!-- export modal -->
<div class="modal-ov" id="exp-modal" onclick="closeExpBg(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Экспорт HTML</div>
      <button class="btn" onclick="closeExp()">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:12px;color:var(--t2);margin-bottom:10px">Полностью автономный файл — вставьте в сайт или скачайте.</p>
      <div class="code-out" id="exp-code"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="copyExp()">Копировать</button>
      <button class="btn primary" onclick="downloadExp()">Скачать .html</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ────────────────────────────────────────────────
let nodes  = {};   // id → {id,x,y,role,dept,sched,color,duties,emps}
let conns  = [];   // [{from,to,color}]
let connLineColor = '#8b8b8b'; // default line color for new connections
let selId  = null;
let connMode = false;
let connFrom = null;
let nc = 0;

// viewport transform
let vx = 0, vy = 0, zoom = 1;

const COLORS = [
  '#5850c8','#7c3aed','#9333ea','#0f766e','#059669',
  '#1d4ed8','#2563eb','#3b82f6','#0369a1','#0284c7',
  '#0891b2','#06b6d4','#4f46e5','#4338ca',
  '#be185d','#db2777','#dc2626','#d97706','#16a34a',
];

function uid() { return 'n' + (++nc) + '_' + Math.random().toString(36).slice(2,5); }

// ─── VIEWPORT ─────────────────────────────────────────────
const world = document.getElementById('world');
const cvWrap = document.getElementById('cv-wrap');

function applyTransform() {
  world.style.transform = `translate(${vx}px, ${vy}px) scale(${zoom})`;
}

// Panning: middle-click or Space+drag
let panning = false, panX = 0, panY = 0;
let spaceDown = false;

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.target.matches('input,textarea')) {
    spaceDown = true; cvWrap.style.cursor = 'grab'; e.preventDefault();
  }
  if (e.key === 'Escape') { if (connMode) toggleConn(); else deselect(); }
  if ((e.key === 'Delete' || e.key === 'Backspace') && selId && !e.target.matches('input,textarea')) deleteSelected();
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') { spaceDown = false; cvWrap.style.cursor = ''; }
});

cvWrap.addEventListener('mousedown', e => {
  if (e.button === 1 || (e.button === 0 && spaceDown)) {
    panning = true; panX = e.clientX - vx; panY = e.clientY - vy;
    cvWrap.style.cursor = 'grabbing'; e.preventDefault();
  }
  if (e.button === 0 && !spaceDown && e.target === cvWrap) deselect();
});
document.addEventListener('mousemove', e => {
  if (!panning) return;
  vx = e.clientX - panX; vy = e.clientY - panY;
  applyTransform();
});
document.addEventListener('mouseup', () => {
  if (panning) { panning = false; cvWrap.style.cursor = spaceDown ? 'grab' : ''; }
});

// Scroll-wheel pan + pinch zoom
cvWrap.addEventListener('wheel', e => {
  e.preventDefault();
  if (e.ctrlKey || e.metaKey) {
    // pinch zoom
    const delta = e.deltaY > 0 ? -0.08 : 0.08;
    const rect = cvWrap.getBoundingClientRect();
    zoomAt(e.clientX - rect.left, e.clientY - rect.top, delta);
  } else {
    vx -= e.deltaX; vy -= e.deltaY;
    applyTransform();
  }
}, { passive: false });

function zoomAt(cx, cy, delta) {
  const newZoom = Math.min(2, Math.max(0.2, zoom + delta));
  const scale = newZoom / zoom;
  vx = cx - scale * (cx - vx);
  vy = cy - scale * (cy - vy);
  zoom = newZoom;
  applyTransform();
  document.getElementById('zoom-lbl').textContent = Math.round(zoom * 100) + '%';
}

function changeZoom(d) {
  const rect = cvWrap.getBoundingClientRect();
  zoomAt(rect.width / 2, rect.height / 2, d);
}

function fitView() {
  const ns = Object.values(nodes);
  if (!ns.length) return;
  const pad = 60;
  const minX = Math.min(...ns.map(n => n.x));
  const minY = Math.min(...ns.map(n => n.y));
  const maxX = Math.max(...ns.map(n => n.x + 200));
  const maxY = Math.max(...ns.map(n => n.y + 70));
  const W = maxX - minX + pad * 2;
  const H = maxY - minY + pad * 2;
  const rect = cvWrap.getBoundingClientRect();
  zoom = Math.min(2, Math.max(0.2, Math.min(rect.width / W, rect.height / H)));
  vx = (rect.width  - W * zoom) / 2 - (minX - pad) * zoom;
  vy = (rect.height - H * zoom) / 2 - (minY - pad) * zoom;
  applyTransform();
  document.getElementById('zoom-lbl').textContent = Math.round(zoom * 100) + '%';
}

// ─── ADD / RENDER NODE ────────────────────────────────────
function addNode(data) {
  const id = data?.id || uid();
  const rect = cvWrap.getBoundingClientRect();
  // place in viewport center
  const cx = (-vx + rect.width  / 2) / zoom;
  const cy = (-vy + rect.height / 2) / zoom;
  nodes[id] = {
    id,
    x:     data?.x     ?? Math.round(cx - 98),
    y:     data?.y     ?? Math.round(cy - 35),
    role:  data?.role  ?? 'Новая должность',
    dept:  data?.dept  ?? 'Команда · Направление',
    sched: data?.sched ?? '5/2',
    color: data?.color ?? COLORS[nc % COLORS.length],
    duties: data?.duties ?? [],
    emps:   data?.emps   ?? [],
  };
  renderNode(id);
  select(id);
  drawLines();
  return id;
}

function renderNode(id) {
  const d = nodes[id];
  let el = document.getElementById(id);
  if (!el) {
    el = document.createElement('div');
    el.className = 'onode';
    el.id = id;
    world.appendChild(el);
    makeDraggable(el);
    el.addEventListener('click', e => {
      e.stopPropagation();
      if (connMode) { handleConn(id); return; }
      if (e.shiftKey) {
        if (multiSel.has(id)) { multiSel.delete(id); el.classList.remove('multi'); }
        else { multiSel.add(id); el.classList.add('multi'); }
        updateMultiUI(); return;
      }
      clearMulti();
      select(id);
    });
  }
  el.style.left = d.x + 'px';
  el.style.top  = d.y + 'px';
  const c1 = ha(d.color, .5), c2 = ha(d.color, .92);
  el.innerHTML =
    `<div class="on-head" style="background:linear-gradient(135deg,${c1},${c2})">
      <div class="on-texts">
        <div class="on-role">${esc(d.role)}</div>
        <div class="on-dept">${esc(d.dept)} · ${esc(d.sched)}</div>
      </div>
      <div class="on-arr"><svg viewBox="0 0 8 8"><path d="M2 1.5l3.5 3L2 7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>`;
}

function ha(hex, a) {
  try { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }
  catch { return hex; }
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─── DRAG ─────────────────────────────────────────────────
function makeDraggable(el) {
  let ox, oy, sx, sy, dragging = false;
  el.addEventListener('mousedown', e => {
    if (e.button !== 0 || connMode || spaceDown) return;
    e.preventDefault(); e.stopPropagation();
    dragging = true;
    ox = e.clientX; oy = e.clientY;
    sx = nodes[el.id].x; sy = nodes[el.id].y;
    el.style.cursor = 'grabbing';
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = (e.clientX - ox) / zoom;
    const dy = (e.clientY - oy) / zoom;
    nodes[el.id].x = Math.round(sx + dx);
    nodes[el.id].y = Math.round(sy + dy);
    el.style.left = nodes[el.id].x + 'px';
    el.style.top  = nodes[el.id].y + 'px';
    drawLines();
  });
  document.addEventListener('mouseup', () => {
    if (dragging) {
      dragging = false; el.style.cursor = 'grab';
      resolveCollisions(); drawLines();
    }
  });
}

// ─── SELECT / SIDEBAR ─────────────────────────────────────
function select(id) {
  document.querySelectorAll('.onode.sel').forEach(n => n.classList.remove('sel'));
  selId = id;
  if (id) {
    document.getElementById(id)?.classList.add('sel');
    document.getElementById('btn-del').style.display = 'inline-flex';
    renderSidebar(id);
  } else {

function handleConn(id) {

      conns.push({ from: connFrom, to: id, color: connLineColor }); toast('Связь добавлена');

// ─── SVG LINES ────────────────────────────────────────────
function nodeBox(id) {
  const el = document.getElementById(id); const d = nodes[id];
  if (!el || !d) return null;
  return { cx: d.x + 98, top: d.y, bot: d.y + el.offsetHeight };
}

function drawLines() {
  const svg = document.getElementById('svg-lines');
  const ns = Object.values(nodes);
  if (!ns.length) { svg.innerHTML = ''; return; }
  const pad = 200;
  const minX = Math.min(...ns.map(n => n.x)) - pad;
  const minY = Math.min(...ns.map(n => n.y)) - pad;
  const maxX = Math.max(...ns.map(n => n.x + 200)) + pad;
  const maxY = Math.max(...ns.map(n => n.y + 100)) + pad;
  svg.style.left = minX + 'px'; svg.style.top = minY + 'px';
  svg.setAttribute('width', maxX - minX);
  svg.setAttribute('height', maxY - minY);
  svg.setAttribute('viewBox', `${minX} ${minY} ${maxX - minX} ${maxY - minY}`);

  const actPairs = new Set();
  if (selId) conns.forEach(c => { if (c.from === selId || c.to === selId) actPairs.add(c.from + '>' + c.to); });
  // dark mode detection
  const dark = window.matchMedia('(prefers-color-scheme:dark)').matches;
  const defaultStroke = dark ? 'rgba(255,255,255,0.28)' : 'rgba(0,0,0,0.18)';

  const seen = new Set();
  let defs = `<defs>`;
  let paths = '';
  let gradIdx = 0;

  conns.forEach(c => {
    const k = c.from + '>' + c.to;
    if (seen.has(k)) return; seen.add(k);
    const p = nodeBox(c.from), ch = nodeBox(c.to);
    if (!p || !ch) return;
    const my = (p.bot + ch.top) / 2;
    const isA = actPairs.has(k);
    const lineColor = c.color || defaultStroke;

    if (isA) {
      // gradient from source color to target color
      const srcColor = nodes[c.from]?.color || '#3b82f6';
      const tgtColor = nodes[c.to]?.color   || '#3b82f6';
      const gid = 'lg' + gradIdx++;
      const vertical = Math.abs(ch.top - p.bot) > Math.abs(ch.cx - p.cx);
      defs += `<linearGradient id="${gid}" x1="${p.cx}" y1="${p.bot}" x2="${ch.cx}" y2="${ch.top}" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="${srcColor}"/>
        <stop offset="100%" stop-color="${tgtColor}"/>
      </linearGradient>`;
      // marker for active
      defs += `<marker id="ah-${gid}" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M1 1.5L8 5L1 8.5" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke="${tgtColor}"/></marker>`;
      paths += `<path d="M${p.cx},${p.bot} C${p.cx},${my} ${ch.cx},${my} ${ch.cx},${ch.top}" fill="none" stroke="url(#${gid})" stroke-width="2.5" stroke-linecap="round" marker-end="url(#ah-${gid})"/>`;
    } else {
      const mid = `<marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M1 1.5L8 5L1 8.5" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke="context-stroke"/></marker>`;
      if (!defs.includes('id="ah"')) defs += mid;
      const stroke = c.color || defaultStroke;
      paths += `<path d="M${p.cx},${p.bot} C${p.cx},${my} ${ch.cx},${my} ${ch.cx},${ch.top}" fill="none" stroke="${stroke}" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ah)"/>`;
    }
  });

  defs += '</defs>';
  svg.innerHTML = defs + paths;
}

// ─── ALIGN ────────────────────────────────────────────────
const NODE_W = 196;
function getSelIds() { return multiSel.size >= 2 ? [...multiSel] : (selId ? [selId] : []); }

function alignSel(dir) {
  const ids = getSelIds(); if (ids.length < 2) { toast('Выберите 2+ блока (Shift+клик)'); return; }
  const ns = ids.map(id => nodes[id]).filter(Boolean);
  if (dir === 'left') { const minX = Math.min(...ns.map(n=>n.x)); ns.forEach(n=>{n.x=minX;}); }
  if (dir === 'right') { const maxX = Math.max(...ns.map(n=>n.x+NODE_W)); ns.forEach(n=>{n.x=maxX-NODE_W;}); }
  if (dir === 'center') { const cx = (Math.min(...ns.map(n=>n.x))+Math.max(...ns.map(n=>n.x+NODE_W)))/2; ns.forEach(n=>{n.x=Math.round(cx-NODE_W/2);}); }
  if (dir === 'top') { const minY = Math.min(...ns.map(n=>n.y)); ns.forEach(n=>{n.y=minY;}); }
  if (dir === 'bottom') { const maxY = Math.max(...ns.map(n=>n.y+60)); ns.forEach(n=>{n.y=maxY-60;}); }
  if (dir === 'middle') { const cy = (Math.min(...ns.map(n=>n.y))+Math.max(...ns.map(n=>n.y+60)))/2; ns.forEach(n=>{n.y=Math.round(cy-30);}); }
  ids.forEach(id => { const el=document.getElementById(id); if(el&&nodes[id]){el.style.left=nodes[id].x+'px';el.style.top=nodes[id].y+'px';} });
  resolveCollisions(); drawLines();
}

function distributeH() {
  const ids = getSelIds().sort((a,b)=>nodes[a].x-nodes[b].x); if(ids.length<3){toast('Нужно 3+ блока');return;}
  const minX=nodes[ids[0]].x, maxX=nodes[ids[ids.length-1]].x;
  const step=(maxX-minX)/(ids.length-1);
  ids.forEach((id,i)=>{nodes[id].x=Math.round(minX+step*i);const el=document.getElementById(id);if(el)el.style.left=nodes[id].x+'px';});
  resolveCollisions(); drawLines();
}

function distributeV() {
  const ids = getSelIds().sort((a,b)=>nodes[a].y-nodes[b].y); if(ids.length<3){toast('Нужно 3+ блока');return;}
  const minY=nodes[ids[0]].y, maxY=nodes[ids[ids.length-1]].y;
  const step=(maxY-minY)/(ids.length-1);
  ids.forEach((id,i)=>{nodes[id].y=Math.round(minY+step*i);const el=document.getElementById(id);if(el)el.style.top=nodes[id].y+'px';});
  drawLines();
}

// ─── ANTI-COLLISION ───────────────────────────────────────
const NODE_H = 68; // approx card height
const MARGIN = 12; // minimum gap between nodes

function resolveCollisions() {
  const ns = Object.values(nodes);
  let changed = true, passes = 0;
  while (changed && passes < 20) {
    changed = false; passes++;
    for (let i = 0; i < ns.length; i++) {
      for (let j = i+1; j < ns.length; j++) {
        const a = ns[i], b = ns[j];
        const overlapX = (a.x + NODE_W + MARGIN) - b.x;
        const overlapY = (a.y + NODE_H + MARGIN) - b.y;
        if (overlapX <= 0 || overlapY <= 0) continue;
        // push apart on smaller axis
        if (overlapX < overlapY) {
          const half = overlapX / 2;
          a.x = Math.round(a.x - half); b.x = Math.round(b.x + half);
        } else {
          const half = overlapY / 2;
          a.y = Math.round(a.y - half); b.y = Math.round(b.y + half);
        }
        changed = true;
      }
    }
  }
  ns.forEach(n => {
    const el = document.getElementById(n.id);
    if (el) { el.style.left = n.x+'px'; el.style.top = n.y+'px'; }
  });
}

function buildExport() {
  const ns = Object.values(nodes);
  if (!ns.length) return '<!-- нет карточек -->';
  const title = document.getElementById('chart-title').value || 'Org Chart';
  const pad = 80;
  const minX = Math.min(...ns.map(n => n.x));
  const minY = Math.min(...ns.map(n => n.y));
  const maxX = Math.max(...ns.map(n => n.x + 200));
  const maxY = Math.max(...ns.map(n => n.y + 70));
  const W = maxX - minX + pad * 2;
  const H = maxY - minY + pad * 2;
  const shifted = ns.map(n => ({ ...n, x: n.x - minX + pad, y: n.y - minY + pad }));
  const nodesJ = JSON.stringify(shifted);
  const connsJ = JSON.stringify(conns);

function posDP(id){
  var el=document.getElementById(id);if(!el)return;
  var nr=el.getBoundingClientRect();
  var left=nr.right+12;
  if(left+320>window.innerWidth-8)left=nr.left-328;
  left=Math.max(8,left);
  var top=Math.max(60,Math.min(nr.top,window.innerHeight-200));
  var dp=document.getElementById('dp');
  dp.style.left=left+'px';dp.style.top=top+'px';
  dp.style.maxHeight=Math.min(580,window.innerHeight-top-16)+'px';
}
function closeDP(){
  document.getElementById('dp').classList.remove('open');
  document.querySelectorAll('.onode.active').forEach(function(n){n.classList.remove('active')});
  activeId=null;drawLines();
}
document.getElementById('body').addEventListener('click',function(e){
  if(!e.target.closest('.onode')&&!e.target.closest('.dp'))closeDP();
});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeDP()});
function nbox(id){
  var el=document.getElementById(id);
  var d=NODES.find(function(n){return n.id===id});
  if(!el||!d)return null;
  return{cx:d.x+100,top:d.y,bot:d.y+el.offsetHeight};
}

  var out='<defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M1 1.5L8 5L1 8.5" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke="context-stroke"/></marker></defs>';
  CONNS.forEach(function(c){
    var k=c.from+'>'+c.to;if(seen.has(k))return;seen.add(k);
    var p=nbox(c.from),ch=nbox(c.to);if(!p||!ch)return;
    var my=(p.bot+ch.top)/2;
    var isA=aSet.has(k);
    out+='<path d="M'+p.cx+','+p.bot+' C'+p.cx+','+my+' '+ch.cx+','+my+' '+ch.cx+','+ch.top+'"'
      +' fill="none" stroke="'+(isA?'#3b82f6':'rgba(0,0,0,0.15)')+'" stroke-width="'+(isA?2.5:1.5)+'"'
      +' stroke-linecap="round" marker-end="url(#ah)"/>';
  });
  svg.innerHTML=out;
}
var rf;function sd(){cancelAnimationFrame(rf);rf=requestAnimationFrame(drawLines)}
window.addEventListener('resize',sd);
window.addEventListener('load',function(){init();setTimeout(drawLines,100)});
<\/script>
</body>
</html>`;
}

// ─── TOAST ────────────────────────────────────────────────
let toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 2200);
}

// init transform
applyTransform();
</script>
